name: Deploy to Staging

on:
  push:
    branches: [develop]

jobs:
  deploy-ml-staging:
    name: Deploy ML Services → Staging
    runs-on: ubuntu-latest
    needs: []
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push ML service images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          for svc in tcga-profiler risk-classifier imaging-classifier survival-predictor shap-explainer; do
            cp -r ml-services/shared ml-services/$svc/shared
            docker build -t $ECR_REGISTRY/cancer-platform/$svc:$IMAGE_TAG ml-services/$svc/
            docker push $ECR_REGISTRY/cancer-platform/$svc:$IMAGE_TAG
          done

      - name: Update Kubernetes deployments (staging)
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

      - name: Helm upgrade — staging
        run: |
          for svc in tcga-profiler risk-classifier imaging-classifier survival-predictor shap-explainer; do
            helm upgrade --install $svc ./k8s/helm/$svc \
              --namespace cancer-ml \
              --set image.tag=${{ github.sha }} \
              --set modelVersion=${{ vars.MODEL_VERSION }} \
              --wait --timeout 5m
          done
