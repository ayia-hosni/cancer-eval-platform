name: Spring Boot Services CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'spring-services/**'
      - '.github/workflows/spring-services-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'spring-services/**'

jobs:
  build-and-test:
    name: Build + Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - patient-service
          - evaluation-orchestrator
          - notification-service
          - audit-service
          - api-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build + test ${{ matrix.service }}
        working-directory: spring-services/${{ matrix.service }}
        run: mvn clean verify --no-transfer-progress

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-${{ matrix.service }}
          path: spring-services/${{ matrix.service }}/target/surefire-reports/

  owasp-dependency-check:
    name: OWASP Dependency Scan
    runs-on: ubuntu-latest
    needs: [build-and-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
      - name: OWASP check — patient-service
        working-directory: spring-services/patient-service
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=9 \
            -DsuppressionFile=../../.owasp-suppressions.xml \
            --no-transfer-progress || true
