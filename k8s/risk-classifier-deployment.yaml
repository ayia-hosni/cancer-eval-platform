apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-classifier
  namespace: cancer-ml
spec:
  replicas: 2
  selector:
    matchLabels:
      app: risk-classifier
  template:
    metadata:
      labels:
        app: risk-classifier
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: risk-classifier
        image: cancer-platform/risk-classifier:latest
        ports:
        - containerPort: 8000
        env:
        - name: KAFKA_BOOTSTRAP
          value: "kafka.cancer-infra.svc.cluster.local:9092"
        - name: MODEL_VERSION
          value: "v1.0.0"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: risk-classifier
  namespace: cancer-ml
spec:
  selector:
    app: risk-classifier
  ports:
  - port: 8000
    targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: risk-classifier-hpa
  namespace: cancer-ml
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: risk-classifier
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
